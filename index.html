<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <title>九宮命格分析</title>
  <style>
    :root{
      --bg:#f6f2ea;
      --card:#fffdf9;
      --text:#2b241d;
      --muted:#6b6158;
      --accent:#8a6a41;
      --line:#e8ded1;
      --shadow:0 10px 30px rgba(61,42,23,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
      background:linear-gradient(180deg,#f8f4ee 0%,#f3eee7 100%);
      color:var(--text);
    }
    .wrap{max-width:920px;margin:0 auto;padding:24px 16px 56px}
    .hero,.card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
    }
    .hero{padding:28px;margin-bottom:20px}
    .hero h1{margin:0 0 8px;font-size:30px}
    .hero p{margin:0;color:var(--muted);line-height:1.8}
    .grid{display:grid;grid-template-columns:1fr 1.1fr;gap:20px}
    .card{padding:22px;border-radius:18px}
    .section-title{margin:0 0 16px;font-size:20px}
    label{display:block;font-weight:700;margin-bottom:8px}
    input[type=text]{
      width:100%;padding:14px 16px;border-radius:14px;border:1px solid #d9cdbd;
      background:#fff;font-size:18px;color:var(--text);outline:none;
    }
    input[type=text]:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(138,106,65,.12);
    }
    .btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    button{
      border:0;border-radius:14px;padding:13px 18px;font-size:16px;font-weight:700;
      cursor:pointer;transition:transform .12s ease,opacity .12s ease;
    }
    button:hover{transform:translateY(-1px)}
    .primary{background:var(--accent);color:#fff}
    .secondary{background:#efe6da;color:var(--text)}
    .hint{margin-top:12px;color:var(--muted);font-size:14px;line-height:1.8}
    .stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .stat{border:1px solid var(--line);background:#fff;border-radius:16px;padding:14px}
    .stat small{display:block;color:var(--muted);margin-bottom:8px}
    .stat strong{font-size:28px;line-height:1}
    textarea{
      width:100%;min-height:280px;border-radius:14px;border:1px solid var(--line);
      padding:14px;resize:vertical;font-size:15px;line-height:1.9;background:#fff;color:var(--text);
    }
    .footer-note{margin-top:18px;color:var(--muted);font-size:13px;line-height:1.8}
    .ok{
      margin-top:10px;font-size:14px;color:#2f6d42;background:#eef7f0;border:1px solid #d6eadb;
      padding:10px 12px;border-radius:12px;display:none;
    }
    @media (max-width:860px){
      .grid{grid-template-columns:1fr}
      .hero h1{font-size:26px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>九宮命格分析</h1>
      <p>這版已將字庫寫在程式裡，頁面上不提供任何字庫編輯入口。一般使用者只能輸入姓名分析，不能直接在畫面上修改字庫內容。</p>
    </section>

    <div class="grid">
      <section class="card">
        <h2 class="section-title">輸入姓名</h2>
        <label for="fullName">姓名</label>
        <input id="fullName" type="text" placeholder="例如：任意三字姓名" />
        <div class="btns">
          <button class="primary" id="analyzeBtn">開始分析</button>
          <button class="secondary" id="demoBtn">帶入範例</button>
          <button class="secondary" id="clearBtn">清空</button>
        </div>

        <div class="ok" id="copyOk">已複製分析結果。</div>
      </section>

      <section class="card">
        <h2 class="section-title">四宮位</h2>
        <div class="stats">
          <div class="stat"><small>父母宮 P</small><strong id="pVal">—</strong></div>
          <div class="stat"><small>疾惡宮 D</small><strong id="dVal">—</strong></div>
          <div class="stat"><small>子女宮 C</small><strong id="cVal">—</strong></div>
          <div class="stat"><small>命宮 L</small><strong id="lVal">—</strong></div>
        </div>
      </section>
    </div>

    <section class="card" style="margin-top:20px;">
      <h2 class="section-title">完整分析結果</h2>
      <textarea id="resultText" readonly>請先輸入姓名，再按下「開始分析」。</textarea>
      <div class="btns">
        <button class="primary" id="copyBtn">複製結果</button>
      </div>
      <p class="footer-note">提醒：這種純 GitHub Pages 靜態網頁，可以做到「一般使用者不能在畫面上改字庫」，但若有人會看原始碼，仍可能看見內建資料。若你要真正不讓外人碰到字庫，需改成後端資料庫版本。</p>
    </section>
  </div>

function normalizeFromTwo(a,b){
  let x = Math.abs(a - b);
  return x < 5 ? x : 9 - x;
}
function digitDiff(num){
  const tens = Math.floor(num / 10);
  const ones = num % 10;
  return normalizeFromTwo(tens, ones);
}
function elementOf(num){
  return elementByLastDigit[num % 10];
}
function relationText(a,b){
  const pair = a + b;
  const same = a === b;
  if (same) return `${a}旺`;
  const sheng = new Set(["木火","火土","土金","金水","水木"]);
  const ke = new Set(["金木","木土","土水","水火","火金"]);
  if (sheng.has(pair)) return `${a}生${b}`;
  if (ke.has(pair)) return `${a}剋${b}`;
  return `${a}${b}`;
}
function getStrokeFromName(fullName){
  const name = fullName.trim();
  if (!name) throw new Error("請先輸入姓名。");

  let surname = "";
  let givenName = "";
  const surnameKeys = Object.keys(surnameStrokeDict).sort((a,b) => b.length - a.length);

  for (const key of surnameKeys){
    if (name.startsWith(key)){
      surname = key;
      givenName = name.slice(key.length);
      break;
    }
  }
  if (!surname) throw new Error("找不到對應姓氏筆畫，請補進內建姓氏表。");
  if (givenName.length !== 2) throw new Error("目前版本需要：姓氏 + 兩個名字字。");

  const [name1Char,name2Char] = givenName.split("");
  const S = surnameStrokeDict[surname];
  const M1 = strokeDict[name1Char];
  const M2 = strokeDict[name2Char];

  const missing = [];
  if (M1 == null) missing.push(`名字第一字「${name1Char}」`);
  if (M2 == null) missing.push(`名字第二字「${name2Char}」`);
  if (missing.length) throw new Error(`找不到筆畫資料：${missing.join("、")}`);

  return { surname, S, M1, M2 };
}

function analyze(){
  const fullName = document.getElementById("fullName").value.trim();
  const { S, M1, M2 } = getStrokeFromName(fullName);

  const P = S + 1;
  const D = S + M1;
  const C = M1 + M2;
  const L = S + M1 + M2;

  document.getElementById("pVal").textContent = P;
  document.getElementById("dVal").textContent = D;
  document.getElementById("cVal").textContent = C;
  document.getElementById("lVal").textContent = L;

  const creative = normalizeFromTwo(P, D);
  const mindset = digitDiff(D);
  const drive = normalizeFromTwo(D, C);
  const team = digitDiff(C);
  const goal = digitDiff(L);

  const fatherEl = elementOf(P);
  const diseaseEl = elementOf(D);
  const childEl = elementOf(C);
  const thought = relationText(fatherEl, diseaseEl);
  const action = relationText(diseaseEl, childEl);

  const star = palaceStars[L] || ["未知星","暫無對照"];
  const genes = {creative, mindset, drive, team, goal};
  const matches = geneDefs.filter(([_,a,b]) => genes[a] === genes[b]);

  let output = `命格分析：${fullName}，命格排列：${P}/${D}/${C}/${L}，思想功能${thought}，行動功能${action}，命宮${L}為${star[0]}，象徵：${star[1]}，人生啟示錄：${goalTexts[goal] || "暫無對照"}，成功基因${matches.length}條，`;

  if (matches.length === 0){
    output = `命格分析：${fullName}，命格排列：${P}/${D}/${C}/${L}，思想功能${thought}，行動功能${action}，命宮${L}為${star[0]}，象徵：${star[1]}，人生啟示錄（目標磁場）：${goalTexts[goal] || "暫無對照"}，成功基因0條。`;
  } else {
    output += "\n\n";
    output += matches.map(([title, , , desc], idx) => `${idx + 1}.${title}\n特色：「${desc}」`).join("\n\n");
  }

  document.getElementById("resultText").value = output;
}

document.getElementById("analyzeBtn").addEventListener("click", () => {
  try {
    analyze();
  } catch (err) {
    alert(err.message);
  }
});

});
