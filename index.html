
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>九宮命格完整分析</title>
  <style>
    :root{
      --bg:#f7f3ee;
      --card:#fffdf9;
      --line:#dfd3c5;
      --text:#3e2f25;
      --muted:#7a6758;
      --accent:#8c6a43;
      --accent2:#e8ded2;
      --ok:#2f7d4f;
      --err:#9d2a22;
      --shadow:0 12px 30px rgba(80,60,40,.10);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
      background:linear-gradient(180deg,#f8f4ef 0%,#f2ebe2 100%);
      color:var(--text);
      padding:24px;
    }
    .wrap{max-width:1180px;margin:0 auto}
    .hero,.card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .hero{padding:26px 28px;margin-bottom:18px}
    h1{margin:0 0 10px;font-size:34px}
    .sub{color:var(--muted);line-height:1.9;margin:0}
    .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
    .card{padding:22px}
    .title{font-size:22px;font-weight:800;margin:0 0 14px}
    label{display:block;font-weight:700;margin:10px 0 8px}
    input,textarea{
      width:100%;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid #d9cbbb;
      background:#fff;
      color:var(--text);
      font-size:16px;
      outline:none;
    }
    input:focus,textarea:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(140,106,67,.12);
    }
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    button{
      border:0;
      border-radius:14px;
      padding:12px 16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
    }
    .primary{background:var(--accent);color:#fff}
    .secondary{background:var(--accent2);color:var(--text)}
    .danger{background:#f3d9d5;color:#7f2018}
    .hint{font-size:13px;color:var(--muted);line-height:1.8;margin-top:10px}
    .status{margin-top:12px;font-size:14px;font-weight:700}
    .ok{color:var(--ok)}
    .err{color:var(--err)}
    .quad{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:6px;
    }
    .mini{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:#fff;
      min-height:92px;
    }
    .mini .k{font-size:13px;color:var(--muted);margin-bottom:6px}
    .mini .v{font-size:28px;font-weight:900}
    .result{
      white-space:pre-wrap;
      line-height:2;
      font-size:17px;
      min-height:280px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
    }
    .footer-note{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
    }
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      h1{font-size:28px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>九宮命格完整分析</h1>
      <p class="sub">
        直接輸入姓名即可分析。<br>
        系統會自動抓姓氏筆畫與名字字庫，輸出完整命格排列、先天五行、後天五行、人生啟示錄與特殊基因特色。
      </p>
    </section>

    <div class="grid">
      <section class="card">
        <div class="title">輸入資料</div>
        <label for="fullName">姓名</label>
        <input id="fullName" type="text" placeholder="例如： 黃仁勳 / 王小明" />

        <div class="btns">
          <button class="primary" id="analyzeBtn">開始分析</button>
          <button class="secondary" id="demoBtn">帶入範例</button>
          <button class="secondary" id="copyBtn">複製結果</button>
          <button class="danger" id="clearBtn">清空</button>
        </div>

        <div id="status" class="status">等待分析。</div>
        <div class="hint">
          支援單姓與內建複姓。若名字字不在內建字庫，系統會提示缺字。<br>
          妳之後只要補在 <code>nameStrokeDict</code> 或 <code>surnameStrokeDict</code> 就能持續擴充。
        </div>
      </section>

      <section class="card">
        <div class="title">四宮位</div>
        <div class="quad">
          <div class="mini"><div class="k">父母宮</div><div class="v" id="pVal">—</div></div>
          <div class="mini"><div class="k">疾惡宮</div><div class="v" id="dVal">—</div></div>
          <div class="mini"><div class="k">奴僕宮</div><div class="v" id="cVal">—</div></div>
          <div class="mini"><div class="k">命宮</div><div class="v" id="lVal">—</div></div>
        </div>
      </section>
    </div>

    <section class="card" style="margin-top:18px">
      <div class="title">完整分析結果</div>
      <div id="result" class="result">請先輸入姓名，再按下「開始分析」。</div>
      <div class="footer-note">
        這版已內建完整公式、命宮星座對照、人生啟示錄、特殊基因特色。
      </div>
    </section>
  </div>

   function normalizeDiff(a,b){
  let x = Math.abs(a - b);
  x = x % 9;
  if (x === 0) return 0;
  return x >= 5 ? 9 - x : x;
}
    function getDigitPairValue(n){
      const tens = Math.floor(n / 10);
      const ones = n % 10;
      return normalizeDiff(tens, ones);
    }

    function elementOf(num){
      const tail = num % 10;
      if (tail === 1 || tail === 2) return "木";
      if (tail === 3 || tail === 4) return "火";
      if (tail === 5 || tail === 6) return "土";
      if (tail === 7 || tail === 8) return "金";
      return "水";
    }

   function relationOf(a,b){
  if (a === b) return `${a}旺`;

  const produce = {
    "木":"火",
    "火":"土",
    "土":"金",
    "金":"水",
    "水":"木"
  };

  const control = {
    "金":"木",
    "木":"土",
    "土":"水",
    "水":"火",
    "火":"金"
  };

  // 先判斷正向相生
  if (produce[a] === b) return `${a}生${b}`;
  // 再判斷反向相生（自動調整順序）
  if (produce[b] === a) return `${b}生${a}`;

  // 先判斷正向相剋
  if (control[a] === b) return `${a}剋${b}`;
  // 再判斷反向相剋（自動調整順序）
  if (control[b] === a) return `${b}剋${a}`;

  return `${a}${b}`;
}
    function sortElementsForDisplay(elements){
  const produceOrder = ["木","火","土","金","水"];

  const counts = {};
  elements.forEach(el => {
    counts[el] = (counts[el] || 0) + 1;
  });

  const unique = [...new Set(elements)];

  for (let i = 0; i < produceOrder.length; i++) {
    const rotated = [...produceOrder.slice(i), ...produceOrder.slice(0, i)];
    const filtered = rotated.filter(el => unique.includes(el));

    if (filtered.length === unique.length) {
      const result = [];
      filtered.forEach(el => {
        for (let j = 0; j < counts[el]; j++) {
          result.push(el);
        }
      });
      return result;
    }
  }

  return elements;
}

function describeFiveElements(elements){
  const sorted = sortElementsForDisplay(elements);
  const special = [];
  const same = [];

  for (let i = 0; i < sorted.length - 1; i++) {
    const rel = relationOf(sorted[i], sorted[i + 1]);
    if (rel.includes("生") || rel.includes("剋")) {
      special.push(rel);
    } else if (rel.includes("旺")) {
      same.push(rel);
    }
  }

  return [...new Set([...special, ...same])].join("、");
}

   function parseName(fullName){
  const name = fullName.trim();
  if (!name) throw new Error("請先輸入姓名。");

  const sortedSurnames = Object.keys(surnameStrokeDict).sort((a,b)=>b.length-a.length);
  const surname = sortedSurnames.find(s => name.startsWith(s));
  if (!surname) throw new Error(`找不到姓氏筆畫：${name}`);

  const given = name.slice(surname.length);

  if (given.length === 2) {
    return {
      surname,
      given1: given[0],
      given2: given[1],
      isSingleName: false
    };
  } else if (given.length === 1) {
    return {
      surname,
      given1: given[0],
      given2: null,
      isSingleName: true
    };
  } else {
    throw new Error("請輸入：單姓雙名 或 單姓單名。");
  }
}  //

function analyzeName(fullName){

  if (!fullName.trim()) {
    throw new Error("請輸入姓名");
  }

  const { surname, given1, given2, isSingleName } = parseName(fullName);

  if (typeof surnameStrokeDict[surname] !== "number") {
    throw new Error(`找不到姓氏筆畫：${surname}`);
  }

  const S = surnameStrokeDict[surname];
  const M1 = nameStrokeDict[given1];

  if (typeof M1 !== "number") throw new Error(`名字字庫缺字：${given1}`);

  let M2 = null;
  if (!isSingleName) {
    M2 = nameStrokeDict[given2];
    if (typeof M2 !== "number") {
      throw new Error(`名字字庫缺字：${given2}`);
    }
  }

  const P = S + 1;
  const D = S + M1;
  const C = isSingleName ? (M1 + 1) : (M1 + M2);
  const L = isSingleName ? (S + M1) : (S + M1 + M2);

  const creative = normalizeDiff(P, D);
  const mindset = getDigitPairValue(D);
  const drive = normalizeDiff(D, C);
  const team = getDigitPairValue(C);
  const goal = getDigitPairValue(L);

  const parentEl = elementOf(P);
  const diseaseEl = elementOf(D);
  const childEl = elementOf(C);

  const thoughtFn = relationOf(parentEl, diseaseEl);
  const actionFn = relationOf(diseaseEl, childEl);

  const [starName, starMeaning] = lifeStarMap[L] || ["未知星","暫無對應"];
  const poem = goalPoemMap.hasOwnProperty(goal) ? goalPoemMap[goal] : "此目標磁場暫無對應人生啟示錄。";

  const metrics = { creative, mindset, drive, team, goal };
  const matchedGenes = geneRules.filter(rule => metrics[rule.keyA] === metrics[rule.keyB]);

  let text =
`命格分析：${fullName}
命格排列：${P}/${D}/${C}/${L}
先天五行：${thoughtFn}
後天五行：${actionFn}
命宮星座：${L}
${starName}
象徵：${starMeaning}
人生啟示錄：${poem}
特殊基因：${matchedGenes.length}條：`;

  if (matchedGenes.length === 0) {
    text =
`命格分析：${fullName}
命格排列：${P}/${D}/${C}/${L}
先天五行：${thoughtFn}
後天五行：${actionFn}
命宮星座：${L}
${starName}
象徵：${starMeaning}
人生啟示錄：${poem}
特殊基因：0條。`;
  } else {
    text += "\n\n";
    matchedGenes.forEach((g, i) => {
      text += `${i + 1}.${g.name}\n特色：「${g.text}」`;
      if (i !== matchedGenes.length - 1) text += "\n\n";
    });
  }

  return { P, D, C, L, text };
}
