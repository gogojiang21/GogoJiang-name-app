<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>九宮命格完整分析生成器</title>
  <style>
    :root{
      --bg:#f6f1e8;
      --card:#fffdf9;
      --line:#e7dccd;
      --text:#2b241c;
      --muted:#6e6255;
      --accent:#8c6840;
      --accent2:#efe4d6;
      --shadow:0 10px 30px rgba(58,40,22,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,#f8f4ee,#f4eee6);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px}
    .hero,.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}
    .hero{padding:24px;margin-bottom:16px}
    h1{margin:0 0 8px;font-size:30px}
    .sub{color:var(--muted);line-height:1.8;margin:0}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{padding:20px}
    .title{font-size:20px;font-weight:800;margin:0 0 14px}
    label{display:block;font-weight:700;margin:10px 0 8px}
    input,textarea{width:100%;padding:14px 16px;border-radius:14px;border:1px solid #d9cbbb;background:#fff;color:var(--text);font-size:16px;outline:none}
    input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(140,104,64,.12)}
    textarea{min-height:180px;line-height:1.7;resize:vertical}
    .btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
    button{border:0;border-radius:14px;padding:12px 16px;font-size:15px;font-weight:800;cursor:pointer}
    .primary{background:var(--accent);color:#fff}
    .secondary{background:var(--accent2);color:var(--text)}
    .hint{font-size:13px;color:var(--muted);line-height:1.8;margin-top:10px}
    .result{white-space:pre-wrap;line-height:2;font-size:17px;min-height:280px}
    .ok{color:#275c2f;font-weight:700}
    .err{color:#9d2222;font-weight:700}
    .bar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-top:12px}
    .pill{padding:8px 12px;border-radius:999px;background:#f3e8db;font-size:13px;font-weight:700;color:#5d4630}
    @media (max-width:900px){.grid{grid-template-columns:1fr} h1{font-size:26px}}
  </style>
</head>

  <div class="wrap">
    <section class="hero">
      <h1>九宮命格完整分析生成器</h1>
      <p class="sub">這版改成可直接輸入姓名，自動從字庫抓筆畫，再輸出你指定格式的完整分析文字。也支援你之後把更多字庫 JSON 直接貼進去擴充。</p>
      <div class="bar">
        <span class="pill">輸入姓名 → 自動查筆畫 → 直接分析</span>
        <span class="pill">支援多段 JSON 字庫</span>
        <span class="pill">一鍵複製結果</span>
      </div>
    </section>

    <div class="grid">
      <section class="card">
        <div class="title">輸入資料</div>
        <label for="fullName">姓名</label>
        <input id="fullName" type="text" placeholder="例如：請輸入你的名字" />

        <label for="strokeData">字庫 JSON</label>
        <textarea id="strokeData"></textarea>
        <div class="hint">這裡已經放入一版可直接用的字庫。你之後要補字，只要把新的 JSON 陣列直接貼進來就可以。若同一個字出現多次，系統會以最後一筆為主。</div>

        <div class="btns">
          <button class="primary" id="analyzeBtn">開始分析</button>
          <button class="secondary" id="copyBtn">複製結果</button>
          <button class="secondary" id="demoBtn">帶入範例</button>
        </div>
        <div id="status" class="hint">等待分析。</div>
      </section>

      <section class="card">
        <div class="title">分析結果</div>
        <div id="result" class="result">請先輸入姓名後按下「開始分析」。</div>
      </section>
    </div>

    function normalizeValue(a,b){
      let x = Math.abs(a - b);
      return x < 5 ? x : 9 - x;

    function parseStrokeData(raw){
      const matches = raw.match(/\[[\s\S]*?\]/g);
      if(!matches) throw new Error('字庫格式讀不到，請確認貼的是 JSON 陣列。');
      const dict = {};
      for(const part of matches){
        const arr = JSON.parse(part);
        for(const item of arr){
          if(item && item['字'] && item['總筆畫'] != null){
            dict[item['字']] = Number(item['總筆畫']);
          }
        }
      }
      return dict;
    }

    function getFiveElement(num){
      const tail = num % 10;
      if(tail === 1 || tail === 2) return '木';
      if(tail === 3 || tail === 4) return '火';
      if(tail === 5 || tail === 6) return '土';
      if(tail === 7 || tail === 8) return '金';
      return '水';
    }

    const sheng = {'木':'火','火':'土','土':'金','金':'水','水':'木'};
    const ke = {'金':'木','木':'土','土':'水','水':'火','火':'金'};

    function relation(a,b){
      if(a === b) return `${a}旺`;
      if(sheng[a] === b) return `${a}生${b}`;
      if(ke[a] === b) return `${a}剋${b}`;
      return `${a}${b}`;
    }

    function getStrokeByName(name, dict){
      const chars = [...name.trim()];
      if(chars.length !== 3) throw new Error('目前版本只支援三個字姓名。');
      const [s,m1,m2] = chars;
      const S = dict[s], M1 = dict[m1], M2 = dict[m2];
      const missing = [];
      if(S == null) missing.push(`姓氏「${s}」`);
      if(M1 == null) missing.push(`名字第一字「${m1}」`);
      if(M2 == null) missing.push(`名字第二字「${m2}」`);
      if(missing.length) throw new Error(`找不到筆畫資料：${missing.join('、')}`);
      return {S,M1,M2};
    }

    function analyze(){
      try{
        const name = el('fullName').value.trim();
        if(!name) throw new Error('請先輸入姓名。');
        const dict = parseStrokeData(el('strokeData').value);
        const {S,M1,M2} = getStrokeByName(name, dict);

        const P = S + 1;
        const D = S + M1;
        const C = M1 + M2;
        const L = S + M1 + M2;

        const creative = normalizeValue(P,D);
        const mindset = normalizeValue(Math.floor(D/10), D%10);
        const drive = normalizeValue(D,C);
        const team = normalizeValue(Math.floor(C/10), C%10);
        const goal = normalizeValue(Math.floor(L/10), L%10);

        const thought = relation(getFiveElement(P), getFiveElement(D));
        const action = relation(getFiveElement(D), getFiveElement(C));
        const star = palaceStars[L] || ['未定義星','暫無對照'];
        const poem = goalTexts[goal] || '目前沒有對應的人生啟示錄';

        const geneValues = {creative, mindset, drive, team, goal};
        const combos = comboDefs.filter(([, , a, b]) => geneValues[a] === geneValues[b]);

        let text = `命格分析：${name}，命格排列：${P}/${D}/${C}/${L}，思想功能${thought}，行動功能${action}，命宮${L}為${star[0]}，象徵：${star[1]}，人生啟示錄：${poem}，成功基因${combos.length}條`;

        if(combos.length === 0){
          text = `命格分析：${name}，命格排列：${P}/${D}/${C}/${L}，思想功能${thought}，行動功能${action}，命宮${L}為${star[0]}，象徵：${star[1]}，人生啟示錄（目標磁場）：${poem}，成功基因0條。`;
        } else {
          text += '，\n\n';
          text += combos.map((item, idx) => `${idx+1}.${item[1]}\n特色：「${item[4]}」`).join('\n\n');
        }

        el('result').textContent = text;
        el('status').innerHTML = `<span class="ok">分析完成。</span> 已自動抓取筆畫：S=${S}、M1=${M1}、M2=${M2}。`;
      }catch(err){
        el('result').textContent = err.message;
        el('status').innerHTML = `<span class="err">分析失敗：</span>${err.message}`;
      }
    }

    el('analyzeBtn').addEventListener('click', analyze);
    el('copyBtn').addEventListener('click', async () => {
      try{
        await navigator.clipboard.writeText(el('result').textContent);
        el('status').innerHTML = `<span class="ok">已複製分析結果。</span>`;
      }catch(err){
        el('status').innerHTML = `<span class="err">複製失敗，請手動選取文字複製。</span>`;
      }
    });
    el('demoBtn').addEventListener('click', () => {
      el('fullName').value = '匡怡如';
      analyze();
    });
  </script>
</body>
</html>
