<html lang="zh-Hant">

  <title>九宮命格完整分析</title>
  <style>
    :root{
      --bg:#f7f3ee;
      --card:#fffdf9;
      --line:#dfd3c5;
      --text:#3e2f25;
      --muted:#7a6758;
      --accent:#8c6a43;
      --accent2:#e8ded2;
      --ok:#2f7d4f;
      --err:#9d2a22;
      --shadow:0 12px 30px rgba(80,60,40,.10);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
      background:linear-gradient(180deg,#f8f4ef 0%,#f2ebe2 100%);
      color:var(--text);
      padding:24px;
    }
    .wrap{max-width:1180px;margin:0 auto}
    .hero,.card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .hero{padding:26px 28px;margin-bottom:18px}
    h1{margin:0 0 10px;font-size:34px}
    .sub{color:var(--muted);line-height:1.9;margin:0}
    .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
    .card{padding:22px}
    .title{font-size:22px;font-weight:800;margin:0 0 14px}
    label{display:block;font-weight:700;margin:10px 0 8px}
    input,textarea{
      width:100%;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid #d9cbbb;
      background:#fff;
      color:var(--text);
      font-size:16px;
      outline:none;
    }
    input:focus,textarea:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(140,106,67,.12);
    }
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    button{
      border:0;
      border-radius:14px;
      padding:12px 16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
    }
    .primary{background:var(--accent);color:#fff}
    .secondary{background:var(--accent2);color:var(--text)}
    .danger{background:#f3d9d5;color:#7f2018}
    .hint{font-size:13px;color:var(--muted);line-height:1.8;margin-top:10px}
    .status{margin-top:12px;font-size:14px;font-weight:700}
    .ok{color:var(--ok)}
    .err{color:var(--err)}
    .quad{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:6px;
    }
    .mini{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:#fff;
      min-height:92px;
    }
    .mini .k{font-size:13px;color:var(--muted);margin-bottom:6px}
    .mini .v{font-size:28px;font-weight:900}
    .result{
      white-space:pre-wrap;
      line-height:2;
      font-size:17px;
      min-height:280px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
    }
    .footer-note{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
    }
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      h1{font-size:28px}
    }
  </style>
</head>

          支援單姓與內建複姓。若名字字不在內建字庫，系統會提示缺字。<br>

        </div>
      </section>
    </div>

      </div>

  </div>

      41:["天權星","信任、機運"],42:["天相星","知識、能力"],43:["獵戶星","毅力、堅持"],44:["光芒星","依附、光芒"],45:["變動星","突顯、變動"],
      46:["四海星","動力、活躍"],47:["官祿星","官氣、財祿"],48:["天貴星","格局、層級"],49:["無主星","自主、風格"],50:["天府星","才智、攀附"],
      51:["晚發星","技術、潛力"],52:["困行星","環境限制"],53:["祿馬星","實力、引力"],54:["守業星","固守、資源"]
    };

    /* ========= 目標磁場人生啟示錄 ========= */
    const goalPoemMap = {
      1:"今生前程不遠求，求官求祿永不休，緊跟貴人得第一，走出自我逍遙遊",
      2:"問我今生走何路，勞勞碌碌皆辛苦，競競業業得天下，若想安逸全盤輸",
      3:"不知前世是何物，投胎來此得福祿，士農工商我皆通，但求用心和惜福",
      4:"志向大海一片天，將相侯王皆不限，欲知高峰在何處，只愛王權不羨仙",
      0:"今生何處去發展，先求穩定與平安，若想更上一層樓，要有名氣或靠山"
    };

    /* ========= 成功基因組合 ========= */
    const geneRules = [
      {
        name:"心念磁場 + 屬下磁場 = 特殊頻率",
        keyA:"mindset", keyB:"team",
        text:"你想要什麼就直接講，講了才會有人幫你。你越敢講，事情就越容易成。"
      },
      {
        name:"創意元素 + 目標磁場 = 特殊機運",
        keyA:"creative", keyB:"goal",
        text:"你先想好要幹嘛，機會就會慢慢出現。你敢去做你的想法，好事就會跟著來。"
      },
      {
        name:"動力元素 + 目標磁場 = 特殊格局",
        keyA:"drive", keyB:"goal",
        text:"你不是慢慢學的人，是一做就上手的人。環境越亂、變動越大，你反而越容易衝出來。"
      },
      {
        name:"心念磁場 + 動力元素 = 特殊權力",
        keyA:"mindset", keyB:"drive",
        text:"你心裡越想掌控，現實就越容易讓你有權力。你越敢爭、越敢上位，就越容易變成主導的人。"
      },
      {
        name:"創意元素 + 屬下磁場 = 特殊魅力",
        keyA:"creative", keyB:"team",
        text:"你有想法敢講，就會有人被你吸過來幫你。你越敢秀自己，資源跟人就越會靠過來。"
      },
      {
        name:"創意元素 + 心念磁場 = 特殊音頻",
        keyA:"creative", keyB:"mindset",
        text:"你現在講的話，可能身邊的人聽不懂，但外面的人會懂。你敢一直講你的理念，最後會變成一個領頭的人。"
      },
      {
        name:"動力元素 + 屬下磁場 = 特殊帶動",
        keyA:"drive", keyB:"team",
        text:"你不是自己做強，是帶一群人一起變強。你只要開始做，大家就會自動跟上你。"
      },
      {
        name:"心念磁場 + 目標磁場 = 特殊感應",
        keyA:"mindset", keyB:"goal",
        text:"你常常會有感覺，而且通常都滿準的。你敢相信、敢講出來，就會有人開始認同你。"
      },
      {
        name:"創意元素 + 動力元素 = 特殊運轉",
        keyA:"creative", keyB:"drive",
        text:"你想到的，不會停在腦袋，會開始動起來。你一開始做，後面就會自己慢慢運轉。"
      }
    ];

    function normalizeDiff(a,b){
      let x = Math.abs(a - b);
      return x >= 5 ? 9 - x : x;
    }

    function getDigitPairValue(n){
      const tens = Math.floor(n / 10);
      const ones = n % 10;
      return normalizeDiff(tens, ones);
    }

    function elementOf(num){
      const tail = num % 10;
      if (tail === 1 || tail === 2) return "木";
      if (tail === 3 || tail === 4) return "火";
      if (tail === 5 || tail === 6) return "土";
      if (tail === 7 || tail === 8) return "金";
      return "水";
    }

    function relationOf(a,b){
      if (a === b) return `${a}旺`;
      const produce = {
        "木":"火","火":"土","土":"金","金":"水","水":"木"
      };
      const control = {
        "金":"木","木":"土","土":"水","水":"火","火":"金"
      };
      if (produce[a] === b) return `${a}生${b}`;
      if (control[a] === b) return `${a}剋${b}`;
      return `${a}${b}`;
    }

    function parseName(fullName){
      const name = fullName.trim();
      if (!name) throw new Error("請先輸入姓名。");

      const sortedSurnames = Object.keys(surnameStrokeDict).sort((a,b)=>b.length-a.length);
      const surname = sortedSurnames.find(s => name.startsWith(s));
      if (!surname) throw new Error(`找不到姓氏筆畫：${name}`);

      const given = name.slice(surname.length);
      if (given.length !== 2) throw new Error("目前需輸入：姓氏 + 兩個名字字。");

      return { surname, given1: given[0], given2: given[1] };
    }

    function analyzeName(fullName){
      const { surname, given1, given2 } = parseName(fullName);

      const S = surnameStrokeDict[surname];
      const M1 = nameStrokeDict[given1];
      const M2 = nameStrokeDict[given2];

      if (typeof M1 !== "number") throw new Error(`名字字庫缺字：${given1}`);
      if (typeof M2 !== "number") throw new Error(`名字字庫缺字：${given2}`);

      const P = S + 1;
      const D = S + M1;
      const C = M1 + M2;
      const L = S + M1 + M2;

      const creative = normalizeDiff(P, D);
      const mindset = getDigitPairValue(D);
      const drive = normalizeDiff(D, C);
      const team = getDigitPairValue(C);
      const goal = getDigitPairValue(L);

      const parentEl = elementOf(P);
      const diseaseEl = elementOf(D);
      const childEl = elementOf(C);

      const thoughtFn = relationOf(parentEl, diseaseEl);
      const actionFn = relationOf(diseaseEl, childEl);

      const [starName, starMeaning] = lifeStarMap[L] || ["未知星","暫無對應"];
      const poem = goalPoemMap.hasOwnProperty(goal) ? goalPoemMap[goal] : "此目標磁場暫無對應人生啟示錄。";

      const metrics = { creative, mindset, drive, team, goal };
      const matchedGenes = geneRules.filter(rule => metrics[rule.keyA] === metrics[rule.keyB]);

      let text = `命格分析：${fullName}，命格排列：${P}/${D}/${C}/${L}，思想功能${thoughtFn}，行動功能${actionFn}，命宮${L}為${starName}，象徵：${starMeaning}，人生啟示錄：${poem}，成功基因${matchedGenes.length}條，`;

      if (matchedGenes.length === 0){
        text = `命格分析：${fullName}，命格排列：${P}/${D}/${C}/${L}，思想功能${thoughtFn}，行動功能${actionFn}，命宮${L}為${starName}，象徵：${starMeaning}，人生啟示錄（目標磁場）：${poem}，成功基因0條。`;
      } else {
        text += "\n\n";
        matchedGenes.forEach((g, i) => {
          text += `${i+1}.${g.name}\n特色：「${g.text}」`;
          if (i !== matchedGenes.length - 1) text += "\n\n";
        });
      }

      return {
        P,D,C,L,
        text
      };
    }

    const fullNameEl = document.getElementById("fullName");
    const resultEl = document.getElementById("result");
    const statusEl = document.getElementById("status");

    function setStatus(msg, type=""){
      statusEl.className = `status ${type}`;
      statusEl.textContent = msg;
    }

    function setPalaceValues(data){
      document.getElementById("pVal").textContent = data?.P ?? "—";
      document.getElementById("dVal").textContent = data?.D ?? "—";
      document.getElementById("cVal").textContent = data?.C ?? "—";
      document.getElementById("lVal").textContent = data?.L ?? "—";
    }

    document.getElementById("analyzeBtn").addEventListener("click", () => {
      try{
        const data = analyzeName(fullNameEl.value);
        setPalaceValues(data);
        resultEl.textContent = data.text;
        setStatus("分析完成。", "ok");
      }catch(err){
        setPalaceValues(null);
        resultEl.textContent = err.message;
        setStatus("分析失敗。", "err");
      }
    });

    document.getElementById("demoBtn").addEventListener("click", () => {
      fullNameEl.value = "匡怡如";
      setStatus("已帶入範例。");
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      fullNameEl.value = "";
      resultEl.textContent = "請先輸入姓名，再按下「開始分析」。";
      setPalaceValues(null);
      setStatus("已清空。");
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      try{
        await navigator.clipboard.writeText(resultEl.textContent);
        setStatus("結果已複製。", "ok");
      }catch{
        setStatus("複製失敗，請手動複製。", "err");
      }
    });
  </script>
